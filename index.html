<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинг ресурсов</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        input[type="text"] { width: 70%; padding: 10px; }
        button { padding: 10px 20px; }
        .result { margin-top: 20px; padding: 10px; background: #f4f4f4; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Проверка доступности ресурсов</h1>
        <input type="text" id="resource" placeholder="call-app01.corp.gpbmobile.ru">
        <button onclick="pingResource()">Пинговать</button>
        <div class="result" id="result"></div>

        <h2>Основные ресурсы</h2>
        <ul>
            <li><a href="https://gpbmobile.hrbox.io/" target="_blank">Mobile.live</a></li>
            <li><a href="https://cnfl.int.gpbmobile.ru/" target="_blank">Confluence</a></li>
            <li><a href="https://github.com" target="_blank">GitHub</a></li>
        </ul>
    </div>

    <script>
        async function pingResource() {
            const resource = document.getElementById('resource').value;
            const resultDiv = document.getElementById('result');

            if (!resource) {
                resultDiv.textContent = "Пожалуйста, введите домен или IP.";
                return;
            }

            try {
                const response = await fetch('/ping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resource: resource })
                });
                const data = await response.json();
                resultDiv.textContent = data.output || "Ошибка при выполнении запроса.";
            } catch (error) {
                resultDiv.textContent = "Ошибка: " + error.message;
            }
        }
    </script>
</body>
</html>
